name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build tamper fixtures
        run: python tests/tamper/build_fixtures.py

      - name: Run pytest
        run: pytest -q

      - name: Run demo script
        run: bash demo/demo.sh

      - name: Run model custody example
        run: bash examples/model_custody/run.sh

      - name: Run exec receipt example
        run: bash examples/exec_receipt/run.sh
